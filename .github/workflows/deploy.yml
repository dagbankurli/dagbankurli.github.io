name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Build dictionary JSON and sync to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node csv_to_json.js
          node scripts/sync-dictionary-to-supabase.js

      - name: Cache-bust and create config.js
        run: |
          BUILD_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          sed -i "s/__BUILD_ID__/$BUILD_ID/g" index.html
          echo "window.SUPABASE_CONFIG={url:\"${{ secrets.SUPABASE_URL }}\",key:\"${{ secrets.SUPABASE_ANON_KEY }}\"};" > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create .nojekyll (bypass Jekyll on Pages)
        run: touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
